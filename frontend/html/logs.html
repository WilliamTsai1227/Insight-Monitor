<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊天 Log | Insight Monitor</title>
    <link rel="stylesheet" href="/css/base.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo"><i data-lucide="activity"></i><span>Insight Monitor</span></div>
            </div>

            </header>
            <div class="page-body">
                <div class="toolbar" id="toolbar"></div>
                <div id="table-container"></div>
                <div id="pagination-container"></div>
            </div>
        </main>
    </div>
    <div id="modal-root"></div>
    <script type="module" src="/js/pages/logs.js"></script>

</html>
